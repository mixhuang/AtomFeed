name: Publish

on:
  push:
    tags: [ "v*" ]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Disable .NET CLI Tools telemetry
        run: |
          echo "DOTNET_CLI_TELEMETRY_OPTOUT=1" >> $GITHUB_ENV

      - name: Extract version from tag
        id: get_version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Pack
        run: |
          dotnet pack \
            --configuration Release \
            --disable-build-servers \
            --include-source \
            --include-symbols \
            --version ${{ env.VERSION }} \
            src/AtomFeed/AtomFeed.csproj

      - name: Publish
        run: |
          dotnet nuget push \
            --skip-duplicate \
            --source nuget.org \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            src/AtomFeed/bin/Release/*.nupkg